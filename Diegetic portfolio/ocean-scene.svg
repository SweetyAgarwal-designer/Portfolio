  <style><![CDATA[
    .scene {
      animation: scenePan 26s ease-in-out infinite alternate;
      transform-origin: 50% 50%;
    }

    .surface-glow {
      animation: glowPulse 12s ease-in-out infinite;
    }

    .surface-glow.glow-b {
      animation-delay: -4s;
    }

    .ray {
      animation: rayShift 20s ease-in-out infinite alternate;
      transform-box: fill-box;
      transform-origin: 50% 0%;
    }

    .ray-b {
      animation-duration: 24s;
      animation-delay: -6s;
    }

    .ray-c {
      animation-duration: 22s;
      animation-delay: -10s;
    }

    .ocean-whale,
    .ocean-predator,
    .ocean-school,
    .bubble,
    .plant-sway {
      transform-box: fill-box;
      transform-origin: center;
    }

    .ocean-whale {
      animation: whaleFloat 17s ease-in-out infinite;
    }

    .ocean-predator {
      animation: predatorCruise 21s ease-in-out infinite alternate;
    }

    .school-a {
      animation: schoolDrift 16s ease-in-out infinite alternate;
    }

    .school-b {
      animation: schoolDrift 20s ease-in-out infinite alternate-reverse;
      animation-delay: -5s;
    }

    .school-c {
      animation: schoolDrift 18s ease-in-out infinite alternate;
      animation-delay: -9s;
    }

    .bubble {
      animation: bubbleLift 14s linear infinite;
      transform-origin: center;
    }

    .bubble.delay-1 {
      animation-delay: -3.5s;
    }

    .bubble.delay-2 {
      animation-delay: -7s;
      animation-duration: 16s;
    }

    .bubble.delay-3 {
      animation-delay: -10s;
      animation-duration: 12s;
    }

    .sparkle {
      animation: sparkle 7s ease-in-out infinite;
    }

    .sparkle.slow {
      animation-duration: 10s;
      animation-delay: -4s;
    }

    .plant-sway {
      animation: plantSway 8.8s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }

    .plant-sway.slow {
      animation-duration: 11.6s;
    }

    @keyframes scenePan {
      0% {
        transform: scale(1.01) translate(0px, 0px);
      }

      100% {
        transform: scale(1.045) translate(-22px, 10px);
      }
    }

    @keyframes glowPulse {
      0%,
      100% {
        opacity: 0.9;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes rayShift {
      0% {
        transform: translate(0px, 0px) scaleY(1);
      }

      100% {
        transform: translate(26px, 18px) scaleY(1.05);
      }
    }

    @keyframes whaleFloat {
      0%,
      100% {
        transform: translate(0px, 0px);
      }

      50% {
        transform: translate(18px, 12px);
      }
    }

    @keyframes predatorCruise {
      0% {
        transform: translate(0px, 0px);
      }

      100% {
        transform: translate(-24px, 18px);
      }
    }

    @keyframes schoolDrift {
      0% {
        transform: translate(0px, 0px);
      }

      100% {
        transform: translate(30px, -12px);
      }
    }

    @keyframes bubbleLift {
      0% {
        transform: translate(0px, 0px) scale(0.92);
        opacity: 0;
      }

      10% {
        opacity: 0.58;
      }

      100% {
        transform: translate(0px, -150px) scale(1.1);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0%,
      100% {
        opacity: 0.18;
      }

      50% {
        opacity: 0.52;
      }
    }

    @keyframes plantSway {
      0%,
      100% {
        transform: rotate(-2deg);
      }

      50% {
        transform: rotate(2.5deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene,
      .surface-glow,
      .ray,
      .ocean-whale,
      .ocean-predator,
      .ocean-school,
      .bubble,
      .sparkle,
      .plant-sway {
        animation: none !important;
      }
    }
  ]]></style>

